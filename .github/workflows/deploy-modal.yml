name: Deploy Modal (Production)

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (all/audio/video/image)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - audio
          - video
          - image

permissions:
  contents: read

env:
  MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
  MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

jobs:
  deploy:
    name: Deploy ${{ inputs.service || 'all' }} services
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Modal CLI
        run: pip install modal

      - name: Deploy Modal services
        run: |
          SERVICE="${{ inputs.service || 'all' }}"
          
          if [ "$SERVICE" = "all" ]; then
            SERVICES=("audio" "video" "image")
          else
            SERVICES=("$SERVICE")
          fi
          
          for svc in "${SERVICES[@]}"; do
            echo "🚀 Deploying $svc service..."
            modal deploy -m "modal_apps.${svc}_service"
            echo "✅ $svc deployed successfully"
          done

      - name: Health check
        run: |
          echo "🏥 Running health checks..."
          python -c "
          import modal
          # Basic health check - verify apps exist
          print('Modal deploy completed. Health checks will run on first invocation.')
          "
