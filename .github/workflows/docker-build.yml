name: Docker Build & Push

on:
  push:
    branches: [main]
    paths:
      - 'colab_docker/**'
  workflow_dispatch:
    inputs:
      model:
        description: 'Build single model (empty = all)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: arda-avci
  CONTEXT: colab_docker

jobs:
  base:
    name: Build base image
    runs-on: ubuntu-latest
    outputs:
      base_tag: ${{ steps.check_base.outputs.base_tag }}
      build_needed: ${{ steps.check_base.outputs.build_needed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if Dockerfile.base changed
        id: check_base
        run: |
          BASE_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/ai-publisher-base:latest"
          echo "base_tag=$BASE_TAG" >> "$GITHUB_OUTPUT"
          
          # Git diff ile colab_docker/Dockerfile.base degisti mi kontrol et
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch triggered. Base image build is required."
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
            if echo "$CHANGED_FILES" | grep -q "^colab_docker/Dockerfile.base$"; then
              echo "build_needed=true" >> "$GITHUB_OUTPUT"
              echo "Dockerfile.base changed. Base image build is required."
            else
              echo "build_needed=false" >> "$GITHUB_OUTPUT"
              echo "Dockerfile.base did not change. Skipping base image build."
            fi
          fi

      - name: Free disk space
        if: steps.check_base.outputs.build_needed == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/julia
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /opt/pipx
          sudo rm -rf /var/lib/mongodb
          sudo rm -rf /var/lib/mysql
          sudo rm -rf /var/lib/postgresql
          sudo apt-get remove -y '^dotnet-.*' || true
          sudo apt-get remove -y '^llvm-.*' || true
          sudo apt-get remove -y 'php.*' || true
          sudo apt-get remove -y google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo docker image prune --all --force || true
          sudo docker builder prune --all --force || true
          df -h

      - name: Login to GHCR
        if: steps.check_base.outputs.build_needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push base image
        if: steps.check_base.outputs.build_needed == 'true'
        id: build_base
        run: |
          BASE_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/ai-publisher-base:latest"
          SHA_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/ai-publisher-base:${{ github.sha }}"
          docker build -f ${{ env.CONTEXT }}/Dockerfile.base \
            -t "$BASE_TAG" -t "$SHA_TAG" \
            ${{ env.CONTEXT }}
          docker push "$BASE_TAG"
          docker push "$SHA_TAG"

  models:
    name: Build ${{ matrix.model }}
    needs: base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model:
          - wav2lip
          - wan
          - wan25
          - ltx
          - hunyuan
          - stablediffusion
          - animatediff
          - audioldm2
          - cogvideox
          - dynamicrafter
          - f5tts
          - kokorotts
          - lora-trainer
          - mochi
          - musetalk
          - pyramid-flow
          - realesrgan
          - sadtalker
          - svd
          - videocrafter
          - whisper
          - xtts
          - zeroscope
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/julia
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /opt/pipx
          sudo rm -rf /var/lib/mongodb
          sudo rm -rf /var/lib/mysql
          sudo rm -rf /var/lib/postgresql
          sudo apt-get remove -y '^dotnet-.*' || true
          sudo apt-get remove -y '^llvm-.*' || true
          sudo apt-get remove -y 'php.*' || true
          sudo apt-get remove -y google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo docker image prune --all --force || true
          sudo docker builder prune --all --force || true
          df -h

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base image
        run: |
          docker pull ${{ needs.base.outputs.base_tag }}
          docker tag ${{ needs.base.outputs.base_tag }} ai-publisher-base:latest

      - name: Build & push ${{ matrix.model }}
        if: ${{ !inputs.model || inputs.model == matrix.model }}
        run: |
          FOLDER_SHA=$(git log -1 --format="%H" -- "${{ env.CONTEXT }}/${{ matrix.model }}")
          SHA_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.model }}:${{ github.sha }}"
          FOLDER_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.model }}:$FOLDER_SHA"
          MODEL_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.model }}:latest"
          
          echo "Checking if image exists for folder SHA $FOLDER_SHA ($FOLDER_TAG)..."
          if docker manifest inspect "$FOLDER_TAG" > /dev/null 2>&1; then
            echo "✅ Image already exists. Skipping build, updating tags..."
            docker pull "$FOLDER_TAG"
            docker tag "$FOLDER_TAG" "$MODEL_TAG"
            docker tag "$FOLDER_TAG" "$SHA_TAG"
            docker push "$MODEL_TAG"
            docker push "$SHA_TAG"
          else
            echo "🚀 Image not found. Starting build..."
            # Copy shared files to model directory to match Colab/Kaniko context behavior
            cp -f ${{ env.CONTEXT }}/runpod_handler.py ${{ env.CONTEXT }}/${{ matrix.model }}/
            cp -f ${{ env.CONTEXT }}/download_weights.sh ${{ env.CONTEXT }}/${{ matrix.model }}/
            cp -rf ${{ env.CONTEXT }}/shared ${{ env.CONTEXT }}/${{ matrix.model }}/
            
            docker build -f ${{ env.CONTEXT }}/${{ matrix.model }}/Dockerfile \
              -t "$MODEL_TAG" -t "$SHA_TAG" -t "$FOLDER_TAG" \
              ${{ env.CONTEXT }}/${{ matrix.model }}
            docker push "$MODEL_TAG"
            docker push "$SHA_TAG"
            docker push "$FOLDER_TAG"
          fi

      - name: Clean up temporary files
        if: always()
        run: |
          rm -f ${{ env.CONTEXT }}/${{ matrix.model }}/runpod_handler.py || true
          rm -f ${{ env.CONTEXT }}/${{ matrix.model }}/download_weights.sh || true
          rm -rf ${{ env.CONTEXT }}/${{ matrix.model }}/shared || true
          sudo docker image prune --all --force || true
          sudo docker builder prune --all --force || true

  special:
    name: Build ${{ matrix.model }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - model: browser-use
            dockerfile: browser-use/Dockerfile
          - model: geneface
            dockerfile: geneface/Dockerfile
          - model: video-retalking
            dockerfile: video-retalking/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/julia
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /opt/pipx
          sudo rm -rf /var/lib/mongodb
          sudo rm -rf /var/lib/mysql
          sudo rm -rf /var/lib/postgresql
          sudo apt-get remove -y '^dotnet-.*' || true
          sudo apt-get remove -y '^llvm-.*' || true
          sudo apt-get remove -y 'php.*' || true
          sudo apt-get remove -y google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo docker image prune --all --force || true
          sudo docker builder prune --all --force || true
          df -h

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.model }}
        if: ${{ !inputs.model || inputs.model == matrix.model }}
        run: |
          DIR=$(dirname "${{ env.CONTEXT }}/${{ matrix.dockerfile }}")
          FOLDER_SHA=$(git log -1 --format="%H" -- "$DIR")
          SHA_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.model }}:${{ github.sha }}"
          FOLDER_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.model }}:$FOLDER_SHA"
          MODEL_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.model }}:latest"
          
          echo "Checking if image exists for folder SHA $FOLDER_SHA ($FOLDER_TAG)..."
          if docker manifest inspect "$FOLDER_TAG" > /dev/null 2>&1; then
            echo "✅ Image already exists. Skipping build, updating tags..."
            docker pull "$FOLDER_TAG"
            docker tag "$FOLDER_TAG" "$MODEL_TAG"
            docker tag "$FOLDER_TAG" "$SHA_TAG"
            docker push "$MODEL_TAG"
            docker push "$SHA_TAG"
          else
            echo "🚀 Image not found. Starting build..."
            # Copy shared files to model directory for context access during build
            cp -f ${{ env.CONTEXT }}/runpod_handler.py "$DIR"/
            cp -f ${{ env.CONTEXT }}/download_weights.sh "$DIR"/
            cp -rf ${{ env.CONTEXT }}/shared "$DIR"/
            
            docker build -f ${{ env.CONTEXT }}/${{ matrix.dockerfile }} \
              -t "$MODEL_TAG" -t "$SHA_TAG" -t "$FOLDER_TAG" \
              "$DIR"
            docker push "$MODEL_TAG"
            docker push "$SHA_TAG"
            docker push "$FOLDER_TAG"
          fi
