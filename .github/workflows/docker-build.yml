name: Docker Build & Push

on:
  push:
    branches: [main]
    paths:
      - 'colab_docker/**'
  workflow_dispatch:
    inputs:
      model:
        description: 'Build single model (empty = all)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: arda-avci
  CONTEXT: colab_docker

jobs:
  base:
    name: Build base image
    runs-on: ubuntu-latest
    outputs:
      base_tag: ${{ steps.check_base.outputs.base_tag }}
      base_cuda124_tag: ${{ steps.check_base.outputs.base_cuda124_tag }}
      base_cuda126_tag: ${{ steps.check_base.outputs.base_cuda126_tag }}
      build_needed: ${{ steps.check_base.outputs.build_needed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if any base Dockerfile changed
        id: check_base
        run: |
          BASE_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/ai-publisher-base:latest"
          BASE_CUDA124_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/ai-publisher-base-cuda124:latest"
          BASE_CUDA126_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/ai-publisher-base-cuda126:latest"
          echo "base_tag=$BASE_TAG" >> "$GITHUB_OUTPUT"
          echo "base_cuda124_tag=$BASE_CUDA124_TAG" >> "$GITHUB_OUTPUT"
          echo "base_cuda126_tag=$BASE_CUDA126_TAG" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch triggered. Base image build is required."
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
            if echo "$CHANGED_FILES" | grep -qE "^colab_docker/Dockerfile\.base(-cuda124|-cuda126)?$"; then
              echo "build_needed=true" >> "$GITHUB_OUTPUT"
              echo "One or more base Dockerfiles changed. Base image build is required."
            else
              echo "build_needed=false" >> "$GITHUB_OUTPUT"
              echo "No base Dockerfiles changed. Skipping base image build."
            fi
          fi

      - name: Free disk space
        if: steps.check_base.outputs.build_needed == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/julia
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /opt/pipx
          sudo rm -rf /var/lib/mongodb
          sudo rm -rf /var/lib/mysql
          sudo rm -rf /var/lib/postgresql
          sudo apt-get remove -y '^dotnet-.*' || true
          sudo apt-get remove -y '^llvm-.*' || true
          sudo apt-get remove -y 'php.*' || true
          sudo apt-get remove -y google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo docker image prune --all --force || true
          sudo docker builder prune --all --force || true
          df -h

      - name: Login to GHCR
        if: steps.check_base.outputs.build_needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set HF_TOKEN
        if: steps.check_base.outputs.build_needed == 'true'
        run: echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> $GITHUB_ENV

      - name: Build & push base image (PyTorch 2.2.1)
        if: steps.check_base.outputs.build_needed == 'true'
        run: |
          BASE_TAG="${{ steps.check_base.outputs.base_tag }}"
          SHA_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/ai-publisher-base:${{ github.sha }}"
          docker build -f ${{ env.CONTEXT }}/Dockerfile.base \
            --build-arg HF_TOKEN=${{ secrets.HF_TOKEN }} \
            -t "$BASE_TAG" -t "$SHA_TAG" \
            ${{ env.CONTEXT }}
          docker push "$BASE_TAG"
          docker push "$SHA_TAG"

      - name: Build & push base image (CUDA 12.4, PyTorch 2.6.0)
        if: steps.check_base.outputs.build_needed == 'true'
        run: |
          BASE_CUDA124_TAG="${{ steps.check_base.outputs.base_cuda124_tag }}"
          SHA_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/ai-publisher-base-cuda124:${{ github.sha }}"
          docker build -f ${{ env.CONTEXT }}/Dockerfile.base-cuda124 \
            --build-arg HF_TOKEN=${{ secrets.HF_TOKEN }} \
            -t "$BASE_CUDA124_TAG" -t "$SHA_TAG" \
            ${{ env.CONTEXT }}
          docker push "$BASE_CUDA124_TAG"
          docker push "$SHA_TAG"

      - name: Build & push base image (CUDA 12.6, PyTorch 2.8.0)
        if: steps.check_base.outputs.build_needed == 'true'
        run: |
          BASE_CUDA126_TAG="${{ steps.check_base.outputs.base_cuda126_tag }}"
          SHA_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/ai-publisher-base-cuda126:${{ github.sha }}"
          docker build -f ${{ env.CONTEXT }}/Dockerfile.base-cuda126 \
            --build-arg HF_TOKEN=${{ secrets.HF_TOKEN }} \
            -t "$BASE_CUDA126_TAG" -t "$SHA_TAG" \
            ${{ env.CONTEXT }}
          docker push "$BASE_CUDA126_TAG"
          docker push "$SHA_TAG"

  models:
    name: Build ${{ matrix.model }}
    needs: base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model:
          - wav2lip
          - wan
          - wan25
          - ltx
          - hunyuan
          - stablediffusion
          - animatediff
          - audioldm2
          - cogvideox
          - dynamicrafter
          - f5tts
          - kokorotts
          - lora-trainer
          - mochi
          - musetalk
          - pyramid-flow
          - realesrgan
          - sadtalker
          - svd
          - videocrafter
          - whisper
          - xtts
          - zeroscope
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/julia
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /opt/pipx
          sudo rm -rf /var/lib/mongodb
          sudo rm -rf /var/lib/mysql
          sudo rm -rf /var/lib/postgresql
          sudo apt-get remove -y '^dotnet-.*' || true
          sudo apt-get remove -y '^llvm-.*' || true
          sudo apt-get remove -y 'php.*' || true
          sudo apt-get remove -y google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo docker image prune --all --force || true
          sudo docker builder prune --all --force || true
          df -h

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set HF_TOKEN
        run: echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> $GITHUB_ENV

      - name: Pull all base images
        run: |
          docker pull ${{ needs.base.outputs.base_tag }} && \
          docker tag ${{ needs.base.outputs.base_tag }} ai-publisher-base:latest
          docker pull ${{ needs.base.outputs.base_cuda124_tag }} && \
          docker tag ${{ needs.base.outputs.base_cuda124_tag }} ai-publisher-base-cuda124:latest
          docker pull ${{ needs.base.outputs.base_cuda126_tag }} && \
          docker tag ${{ needs.base.outputs.base_cuda126_tag }} ai-publisher-base-cuda126:latest

      - name: Build & push ${{ matrix.model }}
        if: ${{ !inputs.model || inputs.model == matrix.model }}
        run: |
          FOLDER_SHA=$(git log -1 --format="%H" -- "${{ env.CONTEXT }}/${{ matrix.model }}")
          SHA_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.model }}:${{ github.sha }}"
          FOLDER_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.model }}:$FOLDER_SHA"
          MODEL_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.model }}:latest"
          
          echo "Checking if image exists for folder SHA $FOLDER_SHA ($FOLDER_TAG)..."
          if docker manifest inspect "$FOLDER_TAG" > /dev/null 2>&1; then
            echo "✅ Image already exists. Skipping build, updating tags..."
            docker pull "$FOLDER_TAG"
            docker tag "$FOLDER_TAG" "$MODEL_TAG"
            docker tag "$FOLDER_TAG" "$SHA_TAG"
            docker push "$MODEL_TAG"
            docker push "$SHA_TAG"
          else
            echo "🚀 Image not found. Starting build..."
            # Copy shared files to model directory to match Colab/Kaniko context behavior
            cp -f ${{ env.CONTEXT }}/runpod_handler.py ${{ env.CONTEXT }}/${{ matrix.model }}/
            cp -f ${{ env.CONTEXT }}/download_weights.sh ${{ env.CONTEXT }}/${{ matrix.model }}/
            cp -rf ${{ env.CONTEXT }}/shared ${{ env.CONTEXT }}/${{ matrix.model }}/
            
            docker build -f ${{ env.CONTEXT }}/${{ matrix.model }}/Dockerfile \
              --build-arg HF_TOKEN=${{ secrets.HF_TOKEN }} \
              -t "$MODEL_TAG" -t "$SHA_TAG" -t "$FOLDER_TAG" \
              ${{ env.CONTEXT }}/${{ matrix.model }}
            docker push "$MODEL_TAG"
            docker push "$SHA_TAG"
            docker push "$FOLDER_TAG"
          fi

      - name: Clean up temporary files
        if: always()
        run: |
          rm -f ${{ env.CONTEXT }}/${{ matrix.model }}/runpod_handler.py || true
          rm -f ${{ env.CONTEXT }}/${{ matrix.model }}/download_weights.sh || true
          rm -rf ${{ env.CONTEXT }}/${{ matrix.model }}/shared || true
          sudo docker image prune --all --force || true
          sudo docker builder prune --all --force || true

  special:
    name: Build ${{ matrix.model }}
    needs: base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - model: browser-use
            dockerfile: browser-use/Dockerfile
          - model: geneface
            dockerfile: geneface/Dockerfile
          - model: video-retalking
            dockerfile: video-retalking/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/julia
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /opt/pipx
          sudo rm -rf /var/lib/mongodb
          sudo rm -rf /var/lib/mysql
          sudo rm -rf /var/lib/postgresql
          sudo apt-get remove -y '^dotnet-.*' || true
          sudo apt-get remove -y '^llvm-.*' || true
          sudo apt-get remove -y 'php.*' || true
          sudo apt-get remove -y google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo docker image prune --all --force || true
          sudo docker builder prune --all --force || true
          df -h

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set HF_TOKEN
        run: echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> $GITHUB_ENV

      - name: Pull all base images
        run: |
          docker pull ${{ needs.base.outputs.base_tag }} && \
          docker tag ${{ needs.base.outputs.base_tag }} ai-publisher-base:latest
          docker pull ${{ needs.base.outputs.base_cuda124_tag }} && \
          docker tag ${{ needs.base.outputs.base_cuda124_tag }} ai-publisher-base-cuda124:latest
          docker pull ${{ needs.base.outputs.base_cuda126_tag }} && \
          docker tag ${{ needs.base.outputs.base_cuda126_tag }} ai-publisher-base-cuda126:latest

      - name: Build & push ${{ matrix.model }}
        if: ${{ !inputs.model || inputs.model == matrix.model }}
        run: |
          DIR=$(dirname "${{ env.CONTEXT }}/${{ matrix.dockerfile }}")
          FOLDER_SHA=$(git log -1 --format="%H" -- "$DIR")
          SHA_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.model }}:${{ github.sha }}"
          FOLDER_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.model }}:$FOLDER_SHA"
          MODEL_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.model }}:latest"
          
          echo "Checking if image exists for folder SHA $FOLDER_SHA ($FOLDER_TAG)..."
          if docker manifest inspect "$FOLDER_TAG" > /dev/null 2>&1; then
            echo "✅ Image already exists. Skipping build, updating tags..."
            docker pull "$FOLDER_TAG"
            docker tag "$FOLDER_TAG" "$MODEL_TAG"
            docker tag "$FOLDER_TAG" "$SHA_TAG"
            docker push "$MODEL_TAG"
            docker push "$SHA_TAG"
          else
            echo "🚀 Image not found. Starting build..."
            # Copy shared files to model directory for context access during build
            cp -f ${{ env.CONTEXT }}/runpod_handler.py "$DIR"/
            cp -f ${{ env.CONTEXT }}/download_weights.sh "$DIR"/
            cp -rf ${{ env.CONTEXT }}/shared "$DIR"/
            
            docker build -f ${{ env.CONTEXT }}/${{ matrix.dockerfile }} \
              --build-arg HF_TOKEN=${{ secrets.HF_TOKEN }} \
              -t "$MODEL_TAG" -t "$SHA_TAG" -t "$FOLDER_TAG" \
              "$DIR"
            docker push "$MODEL_TAG"
            docker push "$SHA_TAG"
            docker push "$FOLDER_TAG"
          fi
