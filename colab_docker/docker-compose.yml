# ============================================================
# AI Publisher - Colab Docker Orkestrasyon
# Tüm konteynerler container içinde port 5000'de çalışır.
# docker-compose host tarafında 5001-5011 arası portlara映射 eder.
#
# Kullanım:
#   docker compose up -d           # Tümünü başlat
#   docker compose up -d cogvideox # Sadece video
#   docker compose down            # Tümünü durdur
#   docker compose logs -f <svc>   # Log takibi
# ============================================================

services:
  # ── Video Motorları ──────────────────────────────────────
  cogvideox:
    build: ./cogvideox
    image: ai-publisher-cogvideox:latest
    container_name: ai-pub-cogvideox
    ports:
      - "5001:5000"
    volumes:
      - ./shared:/app/shared
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - ai-pub-net

  wan:
